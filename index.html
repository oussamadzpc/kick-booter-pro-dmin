<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Register Channel</title>
</head>

<body>

<h2>تسجيل قناة</h2>

<input id="channel" placeholder="اسم القناة"><br>
<input id="email" placeholder="الإيميل"><br>
<input id="discord" placeholder="Discord"><br>

<button onclick="submit()">إرسال</button>

<p id="msg"></p>

<script>
function submit(){
  fetch('/api/channels/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      channel: document.getElementById('channel').value,
      email: document.getElementById('email').value,
      discord: document.getElementById('discord').value
    })
  })
  .then(res=>res.json())
  .then(()=>{
    document.getElementById('msg').innerText = "تم الإرسال ✅";
  });
}
</script>

</body>
</html>
