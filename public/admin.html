<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:white;
}

/* LOGIN */
.login{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#0f172a;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input{
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

/* DASHBOARD */
.container{
  padding:20px;
  display:none;
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  text-align:center;
}

.pending{color:orange;}
.approved{color:green;}
.rejected{color:red;}

button{
  padding:5px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.approve{background:green;}
.reject{background:red;}

.top{
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>🔐 دخول الأدمن</h2>
    <input id="pass" type="password" placeholder="كلمة السر" />
    <br>
    <button onclick="login()">دخول</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container" id="app">

<div class="top">
  <h2>🚀 لوحة التحكم</h2>
  <div>طلبات: <span id="count">0</span></div>
</div>

<table>
<thead>
<tr>
<th>القناة</th>
<th>الإيميل</th>
<th>ديسكورد</th>
<th>الحالة</th>
<th>تحكم</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

const ADMIN_PASS = "2107"; // غيرها ❗

let channels = [];

function login(){
  const val = document.getElementById('pass').value;

  if(val === ADMIN_PASS){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    load();
    startLive();
  }else{
    alert("كلمة السر غلط");
  }
}

async function load(){
  const res = await fetch('/api/channels');
  channels = await res.json();
  render();
}

function render(){
  const table = document.getElementById('table');
  table.innerHTML='';

  channels.forEach(c=>{
    const row = document.createElement('tr');

    row.innerHTML = `
      <td>${c.channel}</td>
      <td>${c.email}</td>
      <td>${c.discord || '-'}</td>
      <td class="${c.status}">${c.status}</td>
      <td>
        <button class="approve" onclick="approve('${c.id}')">✔</button>
        <button class="reject" onclick="reject('${c.id}')">✖</button>
      </td>
    `;

    table.appendChild(row);
  });

  document.getElementById('count').innerText = channels.length;
}

async function approve(id){
  await fetch('/api/channels/approve',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });

  const c = channels.find(x=>x.id===id);
  if(c) c.status = 'approved';

  render();
}

async function reject(id){
  await fetch('/api/channels/reject',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });

  const c = channels.find(x=>x.id===id);
  if(c) c.status = 'rejected';

  render();
}

/* 🔔 LIVE SYSTEM */
function startLive(){
  setInterval(async ()=>{
    const res = await fetch('/api/channels');
    const newData = await res.json();

    if(newData.length !== channels.length){
      alert("🔔 طلب جديد!");
    }

    channels = newData;
    render();

  }, 5000); // كل 5 ثواني
}

</script>

</body>
</html>
