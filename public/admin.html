<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>

<body>

<h2>لوحة التحكم</h2>

<table border="1" id="table">
<tr>
<th>القناة</th>
<th>الإيميل</th>
<th>الحالة</th>
<th>تحكم</th>
</tr>
</table>

<script>

function load(){
  fetch('/api/channels')
  .then(res=>res.json())
  .then(data=>{
    const table = document.getElementById('table');

    data.forEach(c=>{
      const row = document.createElement('tr');

      row.innerHTML = `
        <td>${c.channel}</td>
        <td>${c.email}</td>
        <td>${c.status}</td>
        <td>
          <button onclick="approve(${c.id})">✔</button>
          <button onclick="reject(${c.id})">✖</button>
        </td>
      `;

      table.appendChild(row);
    });
  });
}

function approve(id){
  fetch('/api/channels/approve',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  }).then(()=> location.reload());
}

function reject(id){
  fetch('/api/channels/reject',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  }).then(()=> location.reload());
}

load();

</script>

</body>
</html>
