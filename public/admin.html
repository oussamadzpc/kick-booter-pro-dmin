<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kick Booster Pro — Admin Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --neon-green: #00ff88; --neon-blue: #00d4ff; --neon-purple: #b829dd;
    --neon-pink: #ff2d95; --neon-orange: #ff9500; --neon-red: #ff3b30;
    --neon-gold: #ffd700;
    --glass-bg: rgba(15, 23, 42, 0.5); --glass-border: rgba(255,255,255,0.08);
    --dark-1: #020617; --dark-2: #0f172a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Cairo', 'Inter', sans-serif;
    background: var(--dark-1); color: #fff;
    min-height: 100vh; overflow-x: hidden;
  }

  #particles-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }
  .orb {
    position: fixed; border-radius: 50%; filter: blur(100px); z-index: 1;
    animation: orbFloat 25s ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: var(--neon-purple); top: -150px; right: -150px; opacity: 0.2; }
  .orb-2 { width: 400px; height: 400px; background: var(--neon-blue); bottom: -100px; left: -100px; opacity: 0.15; animation-delay: -8s; }
  .orb-3 { width: 350px; height: 350px; background: var(--neon-green); top: 50%; left: 40%; opacity: 0.1; animation-delay: -16s; }
  @keyframes orbFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px,-50px) scale(1.08); }
    66% { transform: translate(-30px,30px) scale(0.95); }
  }

  .login-screen {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    z-index: 1000; background: var(--dark-1); transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .login-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }
  .login-card {
    background: var(--glass-bg); backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid var(--glass-border); border-radius: 24px;
    padding: 48px 40px; width: 100%; max-width: 400px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .login-card h2 {
    font-family: 'Orbitron', sans-serif; font-size: 1.5rem;
    background: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
  }
  .login-card .sub { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-bottom: 28px; }
  .login-input {
    width: 100%; padding: 14px 18px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3);
    color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 1rem;
    text-align: center; letter-spacing: 4px; outline: none; transition: all 0.3s;
  }
  .login-input:focus {
    border-color: var(--neon-green);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1), 0 0 30px rgba(0,255,136,0.1);
  }
  .login-btn {
    width: 100%; margin-top: 20px; padding: 16px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--neon-green), #00cc6a); color: var(--dark-1);
    font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer;
    text-transform: uppercase; letter-spacing: 2px;
    box-shadow: 0 4px 20px rgba(0,255,136,0.3); transition: all 0.3s;
  }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,255,136,0.5); }
  .login-error { color: var(--neon-red); font-size: 0.8rem; margin-top: 12px; opacity: 0; transition: opacity 0.3s; }
  .login-error.show { opacity: 1; }

  .dashboard { display: none; position: relative; z-index: 10; padding: 24px; max-width: 1600px; margin: 0 auto; }
  .dashboard.active { display: block; animation: fadeIn 0.6s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .dash-header {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 16px; margin-bottom: 28px;
  }
  .dash-header h1 {
    font-family: 'Orbitron', sans-serif; font-size: 1.4rem;
    background: linear-gradient(135deg, var(--neon-green), var(--neon-blue), var(--neon-purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .dash-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .live-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.2);
    padding: 6px 14px; border-radius: 20px; font-size: 0.75rem;
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--neon-green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,136,0.4); } 50% { opacity: 0.7; box-shadow: 0 0 0 8px rgba(0,255,136,0); } }
  .logout-btn {
    background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3);
    padding: 8px 16px; border-radius: 10px; cursor: pointer; font-family: 'Cairo', sans-serif;
    font-size: 0.8rem; font-weight: 700; transition: all 0.3s;
  }
  .logout-btn:hover { background: rgba(239,68,68,0.25); box-shadow: 0 0 20px rgba(239,68,68,0.2); }

  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--glass-bg); backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border); border-radius: 16px;
    padding: 20px; position: relative; overflow: hidden; transition: all 0.3s;
  }
  .stat-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.15); }
  .stat-card::after {
    content: ''; position: absolute; top: 0; right: 0;
    width: 60px; height: 60px; border-radius: 0 16px 0 60px; opacity: 0.1;
  }
  .stat-card.green::after { background: var(--neon-green); }
  .stat-card.blue::after { background: var(--neon-blue); }
  .stat-card.purple::after { background: var(--neon-purple); }
  .stat-card.orange::after { background: var(--neon-orange); }
  .stat-card.red::after { background: var(--neon-red); }
  .stat-card.gold::after { background: var(--neon-gold); }
  .stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value {
    font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; line-height: 1;
  }
  .stat-card.green .stat-value { color: var(--neon-green); text-shadow: 0 0 20px rgba(0,255,136,0.3); }
  .stat-card.blue .stat-value { color: var(--neon-blue); text-shadow: 0 0 20px rgba(0,212,255,0.3); }
  .stat-card.purple .stat-value { color: var(--neon-purple); text-shadow: 0 0 20px rgba(184,41,221,0.3); }
  .stat-card.orange .stat-value { color: var(--neon-orange); text-shadow: 0 0 20px rgba(255,149,0,0.3); }
  .stat-card.red .stat-value { color: var(--neon-red); text-shadow: 0 0 20px rgba(255,59,48,0.3); }
  .stat-card.gold .stat-value { color: var(--neon-gold); text-shadow: 0 0 20px rgba(255,215,0,0.3); }
  .stat-change { font-size: 0.7rem; margin-top: 6px; color: rgba(255,255,255,0.4); }
  .stat-change.up { color: var(--neon-green); }

  .toolbar {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;
  }
  .tool-input {
    padding: 10px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.3); color: #fff; font-family: 'Cairo', sans-serif;
    font-size: 0.85rem; outline: none; transition: all 0.3s; min-width: 200px;
  }
  .tool-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
  .tool-select {
    padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.3); color: #fff; font-family: 'Cairo', sans-serif;
    font-size: 0.85rem; outline: none; cursor: pointer;
  }
  .tool-btn {
    padding: 10px 20px; border-radius: 10px; border: none;
    font-family: 'Cairo', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
  }
  .tool-btn-green { background: linear-gradient(135deg, var(--neon-green), #00cc6a); color: var(--dark-1); }
  .tool-btn-green:hover { box-shadow: 0 4px 20px rgba(0,255,136,0.4); transform: translateY(-2px); }
  .tool-btn-red { background: linear-gradient(135deg, var(--neon-red), #cc2a20); color: #fff; }
  .tool-btn-red:hover { box-shadow: 0 4px 20px rgba(255,59,48,0.4); transform: translateY(-2px); }
  .tool-btn-blue { background: linear-gradient(135deg, var(--neon-blue), #0088cc); color: #fff; }
  .tool-btn-blue:hover { box-shadow: 0 4px 20px rgba(0,212,255,0.4); transform: translateY(-2px); }

  .table-wrap {
    background: var(--glass-bg); backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border); border-radius: 16px;
    overflow: hidden; margin-bottom: 28px;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: rgba(0,0,0,0.3); padding: 14px 16px; text-align: right;
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
    color: rgba(255,255,255,0.5); font-weight: 700; border-bottom: 1px solid var(--glass-border);
  }
  td {
    padding: 12px 16px; font-size: 0.85rem;
    border-bottom: 1px solid rgba(255,255,255,0.03); color: rgba(255,255,255,0.85);
  }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge {
    display: inline-block; padding: 4px 10px; border-radius: 6px;
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-pending { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .badge-approved { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .badge-rejected { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .action-btns { display: flex; gap: 6px; }
  .act-btn {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .act-btn:hover { transform: scale(1.1); }
  .act-ok { background: rgba(34,197,94,0.2); color: #4ade80; }
  .act-no { background: rgba(239,68,68,0.2); color: #f87171; }
  .act-del { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); }

  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: var(--glass-bg); backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border); border-radius: 14px;
    padding: 14px 28px; color: #fff; font-weight: 700;
    z-index: 2000; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4); font-size: 0.9rem;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-ok { border-color: rgba(0,255,136,0.4); color: #4ade80; }
  .toast-err { border-color: rgba(239,68,68,0.4); color: #f87171; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark-1); }
  ::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.25); border-radius: 3px; }

  @media (max-width: 768px) {
    .dash-header { flex-direction: column; align-items: flex-start; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .toolbar { flex-direction: column; align-items: stretch; }
    .tool-input, .tool-select, .tool-btn { width: 100%; }
    table { font-size: 0.75rem; }
    th, td { padding: 8px 10px; }
  }
</style>
</head>
<body>

<<canvas id="particles-canvas"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h2>⚡ ADMIN COMMAND</h2>
    <div class="sub">Kick Booster Pro — Secure Access</div>
    <input type="password" id="adminPass" class="login-input" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">دخول النظام</button>
    <div class="login-error" id="loginError">كلمة السر غير صحيحة</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="dash-header">
    <h1>⚡ COMMAND CENTER</h1>
    <div class="dash-actions">
      <div class="live-badge">
        <div class="live-dot"></div>
        <span>SYSTEM ONLINE</span>
        <span id="sysTime" style="font-family:'JetBrains Mono',monospace;opacity:0.6;"></span>
      </div>
      <button class="logout-btn" onclick="logout()">🚪 خروج</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card green">
      <div class="stat-label">القنوات المفعلة</div>
      <div class="stat-value" id="stApproved">0</div>
      <div class="stat-change up">+12% هذا الأسبوع</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-label">قيد المراجعة</div>
      <div class="stat-value" id="stPending">0</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">إجمالي القنوات</div>
      <div class="stat-value" id="stTotal">0</div>
    </div>
    <div class="stat-card gold">
      <div class="stat-label">الزوار</div>
      <div class="stat-value" id="stVisitors">0</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">الحضور النشط</div>
      <div class="stat-value" id="stPresence">0</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input type="text" id="searchInput" class="tool-input" placeholder="🔍 بحث قناة أو إيميل..." oninput="renderTable()" />
    <select id="filterStatus" class="tool-select" onchange="renderTable()">
      <option value="all">الكل</option>
      <option value="pending">قيد المراجعة</option>
      <option value="approved">مفعلة</option>
      <option value="rejected">مرفوضة</option>
    </select>
    <button class="tool-btn tool-btn-green" onclick="bulkApprove()">✔ تفعيل المحدد</button>
    <button class="tool-btn tool-btn-red" onclick="bulkReject()">✖ رفض المحدد</button>
    <button class="tool-btn tool-btn-blue" onclick="loadAll()">🔄 تحديث</button>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" id="selectAll" onchange="toggleAll()"></th>
          <th>القناة</th>
          <th>الإيميل</th>
          <th>ديسكورد</th>
          <th>الحالة</th>
          <th>التاريخ</th>
          <th>تحكم</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== API BASE (works on Render, localhost, or any domain) =====
const API_BASE = window.location.origin;

// ===== SUPABASE (Read-Only from browser for listing) =====
const SUPABASE_URL = "https://xqwzguqbqiwaduraasjn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhxd3pndXFicWl3YWR1cmFhc2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODQzMTksImV4cCI6MjA5MzU2MDMxOX0.b5Nku_fw5xLl6UBan1Y8otwbL7j5DrAmJ6V0fSIQ3jk";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let channels = [];
let visitors = [];
let selectedIds = new Set();
let adminPassword = '';

// ===== API HELPERS (Go through server, not direct Supabase) =====
async function apiPost(path, body) {
  const res = await fetch(API_BASE + path, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-admin-key': adminPassword
    },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || !data.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ===== PARTICLES =====
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();
class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
    this.size = Math.random()*1.5+0.3; this.speed = Math.random()*0.3+0.1;
    this.angle = Math.random()*Math.PI*2;
    this.color = Math.random()>0.5?'rgba(0,255,136,':'rgba(0,212,255,';
    this.opacity = Math.random()*0.4+0.1;
  }
  update() {
    this.x += Math.cos(this.angle)*this.speed;
    this.y += Math.sin(this.angle)*this.speed;
    if(this.x<<0||this.x>canvas.width||this.y<<0||this.y>canvas.height) this.reset();
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle = this.color+this.opacity+')'; ctx.fill();
  }
}
for(let i=0;i<<80;i++) particles.push(new Particle());
function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(animate);
}
animate();

// ===== LOGIN =====
function doLogin() {
  const pass = document.getElementById('adminPass').value;
  const storedPass = localStorage.getItem('kb_admin_pass');
  if(pass === '2107' || pass === storedPass) {
    adminPassword = pass;
    localStorage.setItem('kb_admin_pass', pass);
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.add('active');
    loadAll(); startLive();
  } else {
    document.getElementById('loginError').classList.add('show');
    setTimeout(()=>document.getElementById('loginError').classList.remove('show'), 3000);
  }
}

function logout() {
  localStorage.removeItem('kb_admin_pass');
  location.reload();
}

// ===== TOAST =====
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast toast-'+type+' show';
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// ===== LOAD DATA =====
async function loadAll() {
  await Promise.all([loadChannels(), loadVisitors()]);
  renderTable(); updateStats();
}

async function loadChannels() {
  const { data, error } = await client.from('channels').select('*').order('created_at', {ascending: false});
  if(error) { console.error(error); return; }
  channels = data || [];
}

async function loadVisitors() {
  const { data, error } = await client.from('visitors').select('*').order('created_at', {ascending: false}).limit(1000);
  if(error) { console.error(error); return; }
  visitors = data || [];
}

function updateStats() {
  const approved = channels.filter(c => c.status === 'approved' && !c.hidden).length;
  const pending = channels.filter(c => c.status === 'pending' && !c.hidden).length;
  const total = channels.length;
  document.getElementById('stApproved').textContent = approved;
  document.getElementById('stPending').textContent = pending;
  document.getElementById('stTotal').textContent = total;
  document.getElementById('stVisitors').textContent = visitors.length;
  document.getElementById('stPresence').textContent = '0';
}

// ===== TABLE =====
function renderTable() {
  const tbody = document.getElementById('tableBody');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.getElementById('filterStatus').value;
  tbody.innerHTML = '';

  channels.filter(c => {
    if(filter !== 'all') {
      if(filter === 'pending' && c.status !== 'pending') return false;
      if(filter === 'approved' && c.status !== 'approved') return false;
      if(filter === 'rejected' && c.status !== 'rejected') return false;
    }
    return (c.channel||'').toLowerCase().includes(search) || (c.email||'').toLowerCase().includes(search);
  }).forEach(c => {
    const tr = document.createElement('tr');
    const status = c.status || 'pending';
    const statusBadge = `<span class="badge badge-${status}">${status==='approved'?'مفعل':status==='pending'?'قيد المراجعة':'مرفوض'}</span>`;
    const checked = selectedIds.has(c.id) ? 'checked' : '';

    tr.innerHTML = `
      <td><input type="checkbox" ${checked} onchange="toggleSelect('${c.id}')"></td>
      <td><strong>${c.channel}</strong></td>
      <td>${c.email||'-'}</td>
      <td>${c.discord||'-'}</td>
      <td>${statusBadge}</td>
      <td>${new Date(c.created_at).toLocaleDateString('ar-SA')}</td>
      <td>
        <div class="action-btns">
          <button class="act-btn act-ok" onclick="approve('${c.id}')" title="تفعيل">✔</button>
          <button class="act-btn act-no" onclick="reject('${c.id}')" title="رفض">✖</button>
          <button class="act-btn act-del" onclick="hideRow('${c.id}')" title="حذف">🗑</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function toggleSelect(id) {
  if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
}
function toggleAll() {
  const checked = document.getElementById('selectAll').checked;
  channels.forEach(c => { if(checked) selectedIds.add(c.id); else selectedIds.delete(c.id); });
  renderTable();
}

// ===== ACTIONS (via Server API) =====
async function approve(id) {
  try {
    await apiPost('/api/channels/approve', { id });
    toast('تم التفعيل'); loadAll();
  } catch(err) {
    toast('خطأ في التفعيل: ' + err.message, 'err');
  }
}

async function reject(id) {
  try {
    await apiPost('/api/channels/reject', { id });
    toast('تم الرفض', 'err'); loadAll();
  } catch(err) {
    toast('خطأ في الرفض: ' + err.message, 'err');
  }
}

async function hideRow(id) {
  try {
    await apiPost('/api/channels/hide', { id });
    toast('تم الحذف'); loadAll();
  } catch(err) {
    toast('خطأ في الحذف: ' + err.message, 'err');
  }
}

async function bulkApprove() {
  const ids = Array.from(selectedIds);
  if(!ids.length) return;
  try {
    await apiPost('/api/channels/bulk-approve', { ids });
    toast('تم تفعيل ' + ids.length + ' قنوات');
    selectedIds.clear(); document.getElementById('selectAll').checked = false;
    loadAll();
  } catch(err) {
    toast('خطأ في التفعيل المجمّع: ' + err.message, 'err');
  }
}

async function bulkReject() {
  const ids = Array.from(selectedIds);
  if(!ids.length) return;
  try {
    await apiPost('/api/channels/bulk-reject', { ids });
    toast('تم رفض ' + ids.length + ' قنوات', 'err');
    selectedIds.clear(); document.getElementById('selectAll').checked = false;
    loadAll();
  } catch(err) {
    toast('خطأ في الرفض المجمّع: ' + err.message, 'err');
  }
}

// ===== LIVE =====
function startLive() {
  setInterval(async () => {
    await loadAll();
  }, 5000);
}

// ===== CLOCK =====
setInterval(() => {
  document.getElementById('sysTime').textContent = new Date().toLocaleTimeString('ar-SA');
}, 1000);

// ===== INIT =====
if(localStorage.getItem('kb_admin_pass')) {
  adminPassword = localStorage.getItem('kb_admin_pass');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.add('active');
  loadAll(); startLive();
}
</script>
</body>
</html>
