<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:white;
}

/* LOGIN */
.login{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#0f172a;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input, select{
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

/* DASHBOARD */
.container{
  padding:20px;
  display:none;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#0f172a;
  border-radius:10px;
  overflow:hidden;
}

td,th{
  padding:10px;
  text-align:center;
}

tr:nth-child(even){
  background:#020617;
}

.pending{color:orange;}
.approved{color:#22c55e;}
.rejected{color:#ef4444;}

button{
  padding:5px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.approve{background:#22c55e;}
.reject{background:#ef4444;}
.hide{background:gray;}

.top{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

.filters{
  display:flex;
  gap:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>🔐 دخول الأدمن</h2>
    <input id="pass" type="password" placeholder="كلمة السر" />
    <br>
    <button onclick="login()">دخول</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container" id="app">

<div class="top">
  <h2>🚀 لوحة التحكم</h2>

  <div class="filters">
    <input id="search" placeholder="بحث..." oninput="render()" />

    <select id="filter" onchange="render()">
      <option value="all">الكل</option>
      <option value="pending">Pending</option>
      <option value="approved">Approved</option>
      <option value="rejected">Rejected</option>
    </select>
  </div>

  <div>طلبات: <span id="count">0</span></div>
</div>

<table>
<thead>
<tr>
<th>القناة</th>
<th>الإيميل</th>
<th>ديسكورد</th>
<th>الحالة</th>
<th>التاريخ</th>
<th>تحكم</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

const ADMIN_PASS = "2107";

let channels = [];

function login(){
  const val = document.getElementById('pass').value;

  if(val === ADMIN_PASS){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    load();
    startLive();
  }else{
    alert("كلمة السر غلط");
  }
}

async function load(){
  const res = await fetch('/api/channels');
  channels = await res.json();
  render();
}

function render(){
  const table = document.getElementById('table');
  const search = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter').value;

  table.innerHTML='';

  let count = 0;

  channels
  .filter(c =>
    (filter === "all" || c.status === filter) &&
    (
      c.channel.toLowerCase().includes(search) ||
      c.email.toLowerCase().includes(search)
    )
  )
  .forEach(c=>{

    const row = document.createElement('tr');
    const date = new Date(c.created_at).toLocaleString();

    row.innerHTML = `
      <td>${c.channel}</td>
      <td>${c.email}</td>
      <td>${c.discord || '-'}</td>
      <td class="${c.status}">${c.status}</td>
      <td>${date}</td>
      <td>
        <button class="approve" onclick="approve('${c.id}')">✔</button>
        <button class="reject" onclick="reject('${c.id}')">✖</button>
        <button class="hide" onclick="hideRow('${c.id}')">🗑</button>
      </td>
    `;

    table.appendChild(row);
    count++;
  });

  document.getElementById('count').innerText = count;
}

async function approve(id){
  await fetch('/api/channels/approve',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });

  updateLocal(id,'approved');
}

async function reject(id){
  await fetch('/api/channels/reject',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });

  updateLocal(id,'rejected');
}

// 🔥 حذف من الواجهة فقط
async function hideRow(id){
  await fetch('/api/channels/hide',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });

  channels = channels.filter(c => c.id !== id);
  render();
}

function updateLocal(id,status){
  const c = channels.find(x=>x.id===id);
  if(c) c.status = status;
  render();
}

/* 🔔 LIVE SYSTEM */
function startLive(){
  setInterval(async ()=>{
    const res = await fetch('/api/channels');
    const newData = await res.json();

    channels = newData;
    render();

  }, 5000);
}

</script>

</body>
</html>
