<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Boost System</title>

<style>
/* (نفس CSS تبعك بدون تغيير) */
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: url('images/galaxy-bg.jpg') no-repeat center center/cover;
  color:#fff;
}

body::before {
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(2,6,23,0.75);
  backdrop-filter: blur(6px);
  z-index:-1;
}

.container {
  padding:40px 20px;
  max-width:1100px;
  margin:auto;
}

.logo {
  width:140px;
  margin-bottom:20px;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
}

h1 { font-size:42px; font-weight:800; }

.subtitle {
  color:#cbd5f5;
  margin-bottom:30px;
  font-size:18px;
}

.hero { text-align:center; }

.btn {
  background: linear-gradient(135deg, #6366f1, #3b82f6);
  padding:16px 34px;
  border:none;
  border-radius:14px;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.btn:disabled {
  background:#1e293b;
  cursor:not-allowed;
}

.features {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:25px;
  margin-top:60px;
}

.card {
  background: rgba(255,255,255,0.06);
  padding:30px;
  border-radius:18px;
}

.images {
  margin-top:70px;
  text-align:center;
}

.images-grid {
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}

.images img {
  width:260px;
  height:170px;
  object-fit:cover;
  border-radius:16px;
}

.counter {
  font-size:48px;
  margin-top:30px;
  color:#38bdf8;
}

.form {
  margin-top:80px;
  background: rgba(255,255,255,0.05);
  padding:30px;
  border-radius:18px;
}

input {
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:none;
}

.status {
  margin-top:15px;
  font-weight:bold;
}

.footer {
  margin-top:60px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <img src="images/kb-logo.png" class="logo">
  <h1>نظام التعاون الذكي للستريمرز</h1>
  <p class="subtitle">
  نظام احترافي يربط القنوات مع بعضها
  </p>

  <div class="counter" id="counter">0</div>
</div>

<div class="features">
  <div class="card">🤝 تعاون حقيقي</div>
  <div class="card">💬 شات تلقائي</div>
  <div class="card">⚡ تفاعل مستمر</div>
  <div class="card">🎯 تحكم كامل</div>
</div>

<div class="images">
  <h2>عرض النظام</h2>
  <div class="images-grid">
    <img src="images/2.png">
    <img src="images/Untitled.png">
  </div>
</div>

<div class="form">
  <h2>تسجيل القناة</h2>

  <input id="channel" placeholder="اسم القناة">
  <input id="email" placeholder="البريد الإلكتروني">
  <input id="discord" placeholder="Discord ID">

  <button class="btn" onclick="submitForm()">إرسال طلب التحقق</button>

  <div class="status" id="status"></div>
</div>

<div class="hero">
  <button class="btn" id="downloadBtn" onclick="openLink()" disabled>
    تحميل الاكستنشن
  </button>
</div>

<div class="footer">
  جميع الحقوق محفوظة
</div>

</div>

<script>

// 🔥 رابط السيرفر (Render)
const API = "https://kick-booter-pro-dmin.onrender.com";

// 🔥 رابط التحميل
const DOWNLOAD_LINK = "https://www.mediafire.com/file/zjdcfsyhvckpfx0/kick-extension-pro-fixed-v4.zip/file";

// =============================
// 🔥 TRACK VISITOR (NEW)
// =============================
async function trackVisitor(){
  try {
    await fetch(API + "/api/track", {
      method: "POST"
    });
  } catch(e){}
}

// تشغيل عند فتح الموقع
trackVisitor();

// =============================
// عداد (وهمي مثل ما هو)
// =============================
let count = 0;
setInterval(()=>{
  count += Math.floor(Math.random()*5);
  document.getElementById('counter').innerText = count;
},1000);

// =============================
// تسجيل
// =============================
async function submitForm(){
  const channel = document.getElementById("channel").value;
  const email = document.getElementById("email").value;
  const discord = document.getElementById("discord").value;

  if(!channel || !email){
    alert("املأ البيانات");
    return;
  }

  document.getElementById('status').innerText = "⏳ جاري الإرسال...";

  const res = await fetch(API + "/api/channels/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ channel, email, discord })
  });

  const data = await res.json();

  if(data.error === "already_exists"){
    document.getElementById('status').innerText = "❌ الطلب موجود مسبقاً";
    return;
  }

  localStorage.setItem("email", email);

  document.getElementById('status').innerText = "⏳ قيد المراجعة";
}

// =============================
// فحص القبول
// =============================
async function checkStatus(){
  const email = localStorage.getItem("email");
  if(!email) return;

  const res = await fetch(API + "/api/channels/status", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  if(data.status === "approved"){
    document.getElementById("downloadBtn").disabled = false;
    document.getElementById("status").innerText = "✅ تم القبول";
  }
}

// تحديث كل 5 ثواني
setInterval(checkStatus, 5000);

// =============================
// تحميل
// =============================
function openLink(){
  window.open(DOWNLOAD_LINK, "_blank");
}

</script>

</body>
</html>
