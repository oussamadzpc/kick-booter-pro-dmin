    button {

      color: white;

    .status {

      padding: 10px;

    .approved { background: #22c55e; }
    .rejected { background: #ef4444; }

    }

    /* 🔥 SOCIAL SECTION */

      margin-top: 20px;

      display: flex;

      align-items: center;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      text-decoration: none;
      color: white;
      font-size: 18px;
      transition: 0.3s;
    }

    .social a:hover {
      background: #22c55e;
      transform: translateY(-3px);
      box-shadow: 0 0 15px #22c55e;
    }

    .footer-text {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
    }

<body>

<div class="container">
  <h2>🚀 Kick Booster</h2>

  <input id="channel" placeholder="اسم القناة" />
  <input id="email" placeholder="الإيميل" />
  <input id="discord" placeholder="ديسكورد" />

  <button onclick="register()">تسجيل</button>

  <div id="statusBox" class="status"></div>

  <a id="downloadBtn" href="https://www.mediafire.com/file/zjdcfsyhvckpfx0/kick-extension-pro-fixed-v4.zip/file">

  <!-- 🔥 SOCIAL MEDIA -->
<div class="social">
  <a href="https://www.facebook.com/XenonGaiming1/" target="_blank" title="Facebook">📘</a>

  <a href="https://www.youtube.com/@xenongaiming" target="_blank" title="YouTube">▶️</a>
  <a href="https://kick.com/mrxenongaming" target="_blank" title="Kick">⚡</a>
</div>

  <div class="footer-text">
    Follow us on social media
  </div>
</div>

<script>

// 🔥 ضع بياناتك هنا
const SUPABASE_URL = "https://xqwzguqbqiwaduraasjn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhxd3pndXFicWl3YWR1cmFhc2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODQzMTksImV4cCI6MjA5MzU2MDMxOX0.b5Nku_fw5xLl6UBan1Y8otwbL7j5DrAmJ6V0fSIQ3jk";

// 🔥 إنشاء الاتصال
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔐 تحميل الإيميل
let savedEmail = localStorage.getItem("email");
if (savedEmail) {
  document.getElementById("email").value = savedEmail;
  checkStatus(savedEmail);
}

// ==========================
async function register() {
  const channel = document.getElementById("channel").value;
  const email = document.getElementById("email").value;
  const discord = document.getElementById("discord").value;

  if (!channel || !email) {
    alert("املأ البيانات");
    return;
  }

  const { error } = await client
    .from("channels")
    .insert([{ channel, email, discord, status: "pending" }]);

  if (error) {
    alert("خطأ: " + error.message);
    return;
  }

  localStorage.setItem("email", email);
  checkStatus(email);
}

// ==========================
async function checkStatus(email) {
  const { data, error } = await client
    .from("channels")
    .select("status")
    .eq("email", email)
    .single();

  if (error || !data) return;

  updateUI(data.status);
}

// ==========================
function updateUI(status) {
  const box = document.getElementById("statusBox");
  const btn = document.getElementById("downloadBtn");

  box.style.display = "block";

  if (status === "pending") {
    box.className = "status pending";
    box.innerText = "⏳ قيد المراجعة";
    btn.style.display = "none";
  }

  else if (status === "approved") {
    box.className = "status approved";
    box.innerText = "✅ تم القبول";
    btn.style.display = "block";
  }

  else if (status === "rejected") {
    box.className = "status rejected";
    box.innerText = "❌ تم الرفض";
    btn.style.display = "none";
  }
}

// 🔄 تحديث تلقائي
setInterval(() => {
  const email = localStorage.getItem("email");
  if (email) checkStatus(email);
}, 5000);

</script>

</body>
