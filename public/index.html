<script>
// ===== SUPABASE =====
const SUPABASE_URL = "https://xqwzguqbqiwaduraasjn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhxd3pndXFicWl3YWR1cmFhc2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODQzMTksImV4cCI6MjA5MzU2MDMxOX0.b5Nku_fw5xLl6UBan1Y8otwbL7j5DrAmJ6V0fSIQ3jk";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const API = window.location.origin;

// ===== PARTICLES =====
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let mouse = { x: null, y: null };

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = (Math.random() - 0.5) * 0.5;
    this.color = Math.random() > 0.5 ? 'rgba(0,255,136,' : 'rgba(0,212,255,';
    this.opacity = Math.random() * 0.5 + 0.2;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (mouse.x != null) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 150) {
        const force = (150 - dist) / 150;
        this.x -= dx * force * 0.02;
        this.y -= dy * force * 0.02;
      }
    }
    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color + this.opacity + ')';
    ctx.fill();
  }
}

function initParticles() {
  particles = [];
  const count = Math.min(100, Math.floor((canvas.width * canvas.height) / 15000));
  for (let i = 0; i < count; i++) particles.push(new Particle());
}
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(0,255,136,${0.1 * (1 - dist/120)})`;
        ctx.lineWidth = 0.5;
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animateParticles);
}
window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
initParticles();
animateParticles();

// ===== TOAST =====
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== REGISTER =====
async function register() {
  const channel = document.getElementById('channel').value.trim();
  const email = document.getElementById('email').value.trim();
  const discord = document.getElementById('discord').value.trim();
  const lang = document.getElementById('lang').value;
  const dialect = document.getElementById('dialect').value;
  const country = document.getElementById('country').value;
  const persona = document.getElementById('persona').value;

  if (!channel || !email) {
    showToast('املأ البيانات المطلوبة', 'error');
    return;
  }

  const btn = document.querySelector('.neon-btn-primary');
  btn.disabled = true;
  document.getElementById('btnText').textContent = 'جاري التسجيل...';

  try {
    const { error } = await client.from('channels').insert([{
      channel, email, discord,
      preferred_style: lang,
      preferred_arabic_type: dialect,
      preferred_country: country,
      preferred_persona: persona,
      status: 'pending'
    }]);

    if (error) {
      if (error.message.includes('duplicate')) showToast('القناة مسجلة مسبقاً', 'error');
      else showToast('خطأ: ' + error.message, 'error');
      return;
    }

    localStorage.setItem('kb_email', email);
    showToast('تم التسجيل بنجاح!');
    checkStatus(email);
    trackVisit();
  } catch (err) {
    showToast('خطأ في الاتصال', 'error');
  } finally {
    btn.disabled = false;
    document.getElementById('btnText').textContent = 'تسجيل الآن';
  }
}

// ===== CHECK STATUS =====
async function checkStatus(email) {
  try {
    const { data, error } = await client.from('channels').select('status').eq('email', email).order('created_at', { ascending: false }).limit(1).maybeSingle();
    if (error || !data) return;
    updateUI(data.status);
  } catch {}
}

function updateUI(status) {
  const box = document.getElementById('statusBox');
  const dl = document.getElementById('downloadWrap');
  box.style.display = 'block';
  dl.style.display = 'none';
  box.className = 'status-box';

  if (status === 'pending') {
    box.classList.add('status-pending');
    box.innerHTML = '⏳ قيد المراجعة — سيتم إشعارك بالبريد';
  } else if (status === 'approved') {
    box.classList.add('status-approved');
    box.innerHTML = '✅ تم القبول! يمكنك تحميل الإكستنشن';
    dl.style.display = 'block';
  } else if (status === 'rejected') {
    box.classList.add('status-rejected');
    box.innerHTML = '❌ تم الرفض — تواصل مع الدعم';
  }
}

async function checkExisting() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showToast('أدخل الإيميل أولاً', 'error'); return; }
  await checkStatus(email);
}

// ===== LIVE STATS =====
async function loadStats() {
  try {
    const res = await fetch(API + '/api/stats');
    const data = await res.json();
    document.getElementById('statUsers').textContent = data.total || 0;
    document.getElementById('statChannels').textContent = data.approved || 0;
    document.getElementById('statLive').textContent = data.liveNow || 0;
  } catch {}
}

// ===== TRACK VISIT =====
async function trackVisit() {
  try { await fetch(API + '/api/track', { method: 'POST' }); } catch {}
}

// ===== INIT =====
const savedEmail = localStorage.getItem('kb_email');
if (savedEmail) {
  document.getElementById('email').value = savedEmail;
  checkStatus(savedEmail);
}
loadStats();
setInterval(loadStats, 10000);
trackVisit();
</script>
